name: Mocha Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  mocha:
    name: Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Run Mocha tests
        run: npm test

      - name: Verify index.d.ts is in sync with the TS source
        run: |
          npm run build:types
          git diff --exit-code -- index.d.ts
